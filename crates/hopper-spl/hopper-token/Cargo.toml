[package]
name = "hopper-token"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["BluefootLabs <contact@bluefootlabs.com>", "MoonManQuark"]
description = "Hopper-owned SPL Token builder surface. Thin, no_std instruction builders over Hopper Runtime."
repository = "https://github.com/BluefootLabs/Hopper-Solana-Zero-copy-State-Framework"
homepage = "https://hopperzero.dev"
documentation = "https://docs.rs/hopper-token"
readme = "README.md"
keywords = ["solana", "spl-token", "cpi", "zero-copy", "hopper"]
categories = ["no-std"]

[lib]
name = "hopper_token"

[dependencies]
hopper-runtime = { workspace = true }

[features]
default = ["hopper-native-backend"]
hopper-native-backend = ["hopper-runtime/hopper-native-backend"]
legacy-pinocchio-compat = ["hopper-runtime/legacy-pinocchio-compat"]
solana-program-backend = ["hopper-runtime/solana-program-backend"]
legacy-token-instructions = ["hopper-runtime/legacy-token-instructions"]

[lints]
workspace = true