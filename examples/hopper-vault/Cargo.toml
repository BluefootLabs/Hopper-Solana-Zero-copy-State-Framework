[package]
name = "hopper-vault"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib", "lib"]

[dependencies]
hopper = { path = "../..", default-features = false }

[features]
default = ["hopper-native-backend"]
hopper-native-backend = ["hopper/hopper-native-backend"]
legacy-pinocchio-compat = ["hopper/legacy-pinocchio-compat"]
solana-program-backend = ["hopper/solana-program-backend"]

[dev-dependencies]
mollusk-svm = "0.10.3"
openssl = { version = "0.10", features = ["vendored"] }
solana-account = "3.4.0"
solana-address = { version = "2.2.0", features = ["decode"] }
solana-instruction = { version = "3.1.0", features = ["bincode"] }

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(target_os, values("solana"))'] }
